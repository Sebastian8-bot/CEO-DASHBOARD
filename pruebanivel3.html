<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Nivel - Matemática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Crimson+Text:ital@0;1&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            color: #1e3c72;
            font-family: 'Crimson Text', serif;
            font-weight: 700;
        }

        .header-sub {
            font-size: 13px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            transition: width 0.3s ease;
        }

        .question-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            opacity: 0;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 12px;
            color: #f5576c;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.6;
            font-family: 'Crimson Text', serif;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
        }

        .option:hover {
            border-color: #2a5298;
            background: #f8fafb;
        }

        .option.selected {
            border-color: #2a5298;
            background: #e8f0ff;
        }

        .option.correct {
            border-color: #27ae60;
            background: #d5f4e6;
            animation: correctPulse 0.5s ease;
        }

        .option.incorrect {
            border-color: #e74c3c;
            background: #fadbd8;
            animation: shake 0.4s ease;
        }

        .option.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback {
            margin-top: 20px;
            padding: 18px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            line-height: 1.7;
        }

        .feedback.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .feedback.correct {
            background: #d5f4e6;
            border-left: 4px solid #27ae60;
            color: #0e5d32;
        }

        .feedback.incorrect {
            background: #fadbd8;
            border-left: 4px solid #e74c3c;
            color: #78281f;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-next {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.3);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-skip {
            background: #ecf0f1;
            color: #7f8c8d;
        }

        .btn-skip:hover {
            background: #bdc3c7;
        }

        .results {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .results h2 {
            font-size: 32px;
            color: #1e3c72;
            margin-bottom: 20px;
            font-family: 'Crimson Text', serif;
        }

        .results-score {
            font-size: 48px;
            font-weight: 700;
            color: #2a5298;
            margin: 20px 0;
        }

        .results-message {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .detail-box {
            background: #f8fafb;
            padding: 20px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 12px;
            color: #95a5a6;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .question-card {
                padding: 25px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Prueba de Nivel Nº3</h1>
                <p class="header-sub">Matemática - II° Medio - 1er Semestre 2026</p>
            </div>
        </div>

        <div id="quiz-container"></div>

        <div id="results-container" class="hidden">
            <div class="results">
                <h2>¡Prueba Completada!</h2>
                <div class="results-score" id="final-score"></div>
                <p class="results-message" id="results-message"></p>
                <div class="results-details">
                    <div class="detail-box">
                        <div class="detail-label">Correctas</div>
                        <div class="detail-value" id="correct-count"></div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Incorrectas</div>
                        <div class="detail-value" id="incorrect-count"></div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Omitidas</div>
                        <div class="detail-value" id="skipped-count"></div>
                    </div>
                </div>
                <button class="btn btn-next" onclick="location.reload()">Nueva Prueba</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "¿Cuál es el valor de ∛27?",
                options: ["3", "9", "27", "81"],
                correct: 0,
                feedback: "Correcto. ∛27 = 3, porque 3³ = 3 × 3 × 3 = 27. La raíz cúbica es el número que elevado al cubo da 27.",
                topic: "Raíces Cúbicas"
            },
            {
                id: 2,
                text: "¿Cuál es el resultado de √125 × √5?",
                options: ["√625", "25", "√130", "5√25"],
                correct: 1,
                feedback: "Correcto. √125 × √5 = √(125 × 5) = √625 = 25. Se usa la propiedad: √a × √b = √(ab) cuando tienen igual índice.",
                topic: "Raíces"
            },
            {
                id: 3,
                text: "Expresa 4^(1/2) como raíz:",
                options: ["∜4", "√4", "∛4", "4√2"],
                correct: 1,
                feedback: "Correcto. a^(1/n) = ⁿ√a, entonces 4^(1/2) = √4 = 2. El exponente fraccionario se convierte en una raíz.",
                topic: "Exponentes Racionales"
            },
            {
                id: 4,
                text: "¿Cuál es el resultado de ∛64 ÷ ∛8?",
                options: ["2", "4", "8", "∛8"],
                correct: 0,
                feedback: "Correcto. ∛64 ÷ ∛8 = ∛(64 ÷ 8) = ∛8 = 2. Se usa la propiedad: ⁿ√a ÷ ⁿ√b = ⁿ√(a÷b).",
                topic: "Raíces"
            },
            {
                id: 5,
                text: "¿Cuál es la descomposición de √180?",
                options: ["6√5", "9√2", "10√18", "4√45"],
                correct: 0,
                feedback: "Correcto. 180 = 36 × 5, entonces √180 = √(36 × 5) = √36 × √5 = 6√5. Se extrae el factor cuadrado perfecto.",
                topic: "Raíces"
            },
            {
                id: 6,
                text: "¿Cuál es el resultado de 2⁻¹/² ?",
                options: ["1/2", "√2/2", "2", "-√2"],
                correct: 1,
                feedback: "Correcto. 2⁻¹/² = 1/(2^(1/2)) = 1/√2 = √2/2 (racionalizado). Un exponente negativo invierte la expresión.",
                topic: "Exponentes Racionales"
            },
            {
                id: 7,
                text: "Simplifica: ⁴√81",
                options: ["3", "9", "27", "√9"],
                correct: 0,
                feedback: "Correcto. ⁴√81 = ⁴√(3⁴) = 3, porque 3⁴ = 81. La raíz cuarta de 81 es 3.",
                topic: "Raíces"
            },
            {
                id: 8,
                text: "¿Cuál es el resultado de (√2 + √8) simplificado?",
                options: ["3√2", "√10", "2√4", "√2 + 2√2"],
                correct: 0,
                feedback: "Correcto. √8 = 2√2, entonces √2 + √8 = √2 + 2√2 = 3√2. Se simplifican los términos semejantes.",
                topic: "Raíces"
            },
            {
                id: 9,
                text: "¿Cuál es el volumen de un cubo si su arista mide ∛2 cm?",
                options: ["2 cm³", "(∛2)³ cm³", "∛8 cm³", "1 cm³"],
                correct: 0,
                feedback: "Correcto. V = a³ = (∛2)³ = 2 cm³. El volumen es el cubo de la arista, y (∛2)³ = 2 por definición de raíz.",
                topic: "Raíces - Aplicación"
            },
            {
                id: 10,
                text: "¿Cuál es el resultado de (27)^(1/3)?",
                options: ["3", "9", "27", "√27"],
                correct: 0,
                feedback: "Correcto. 27^(1/3) = ∛27 = 3, porque 3³ = 27. Los exponentes fraccionarios se convierten a raíces.",
                topic: "Exponentes Racionales"
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('quiz-container');

            let optionsHTML = '';
            question.options.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === index;
                optionsHTML += `
                    <label class="option ${isSelected ? 'selected' : ''}">
                        <input type="radio" name="answer" value="${index}" ${isSelected ? 'checked' : ''} 
                               onchange="selectAnswer(${index})">
                        <span>${String.fromCharCode(65 + index)}) ${option}</span>
                    </label>
                `;
            });

            const feedbackHTML = answers[currentQuestion] !== null ? `
                <div class="feedback show ${answers[currentQuestion] === question.correct ? 'correct' : 'incorrect'}">
                    <div class="feedback-title">
                        ${answers[currentQuestion] === question.correct ? '✓ Respuesta Correcta' : '✗ Respuesta Incorrecta'}
                    </div>
                    <div>${question.feedback}</div>
                </div>
            ` : '';

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length} • ${question.topic}</div>
                    <div class="question-text">${question.text}</div>
                    <div class="options">
                        ${optionsHTML}
                    </div>
                    ${feedbackHTML}
                    <div class="button-group">
                        <button class="btn btn-skip" onclick="skipQuestion()" ${currentQuestion === 0 ? 'style="visibility: hidden;"' : ''}>Anterior</button>
                        <button class="btn btn-next" onclick="nextQuestion()" ${answers[currentQuestion] === null ? 'disabled' : ''}>
                            ${currentQuestion === questions.length - 1 ? 'Finalizar' : 'Siguiente'}
                        </button>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${((currentQuestion + 1) / questions.length) * 100}%"></div>
                </div>
            `;

            document.querySelectorAll('input[name="answer"]').forEach(input => {
                input.addEventListener('change', function() {
                    selectAnswer(parseInt(this.value));
                });
            });
        }

        function selectAnswer(index) {
            const question = questions[currentQuestion];
            answers[currentQuestion] = index;

            const options = document.querySelectorAll('.option');
            options.forEach((option, i) => {
                option.classList.remove('selected', 'correct', 'incorrect', 'disabled');
                if (i === index) {
                    if (index === question.correct) {
                        option.classList.add('correct');
                    } else {
                        option.classList.add('incorrect');
                    }
                }
                if (i !== index && answers[currentQuestion] !== null) {
                    option.classList.add('disabled');
                    if (i === question.correct) {
                        option.classList.add('correct');
                    }
                }
            });

            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = `feedback show ${index === question.correct ? 'correct' : 'incorrect'}`;
            feedbackDiv.innerHTML = `
                <div class="feedback-title">
                    ${index === question.correct ? '✓ Respuesta Correcta' : '✗ Respuesta Incorrecta'}
                </div>
                <div>${question.feedback}</div>
            `;

            const oldFeedback = document.querySelector('.feedback');
            if (oldFeedback) oldFeedback.remove();
            document.querySelector('.question-card').appendChild(feedbackDiv);

            document.querySelector('.btn-next').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function skipQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function finishQuiz() {
            const correct = answers.filter((ans, i) => ans === questions[i].correct).length;
            const incorrect = answers.filter(ans => ans !== null).length - correct;
            const skipped = answers.filter(ans => ans === null).length;
            const percentage = Math.round((correct / questions.length) * 100);

            let message = '';
            if (percentage >= 85) {
                message = '¡Excelente desempeño! Has demostrado dominar los contenidos avanzados.';
            } else if (percentage >= 70) {
                message = '¡Muy bien! Comprenden bien las raíces y exponentes racionales.';
            } else if (percentage >= 50) {
                message = 'Buen intento. Refuerza los temas de raíces avanzadas.';
            } else {
                message = 'Necesitas practicar más. Estos temas requieren concentración.';
            }

            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('results-container').classList.remove('hidden');
            document.getElementById('final-score').textContent = `${percentage}%`;
            document.getElementById('results-message').textContent = message;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('skipped-count').textContent = skipped;
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
