<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Nivel - Matemática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Crimson+Text:ital@0;1&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #1e3c72;
            font-family: 'Crimson Text', serif;
            font-weight: 700;
        }

        .header-sub {
            font-size: 13px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .timer {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            min-width: 120px;
        }

        .timer.warning {
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            transition: width 0.3s ease;
        }

        .question-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            opacity: 0;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 12px;
            color: #f5576c;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.6;
            font-family: 'Crimson Text', serif;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
        }

        .option:hover {
            border-color: #2a5298;
            background: #f8fafb;
        }

        .option.selected {
            border-color: #2a5298;
            background: #e8f0ff;
        }

        .option.correct {
            border-color: #27ae60;
            background: #d5f4e6;
            animation: correctPulse 0.5s ease;
        }

        .option.incorrect {
            border-color: #e74c3c;
            background: #fadbd8;
            animation: shake 0.4s ease;
        }

        .option.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback {
            margin-top: 20px;
            padding: 18px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            line-height: 1.7;
        }

        .feedback.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .feedback.correct {
            background: #d5f4e6;
            border-left: 4px solid #27ae60;
            color: #0e5d32;
        }

        .feedback.incorrect {
            background: #fadbd8;
            border-left: 4px solid #e74c3c;
            color: #78281f;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-next {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.3);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-skip {
            background: #ecf0f1;
            color: #7f8c8d;
        }

        .btn-skip:hover {
            background: #bdc3c7;
        }

        .results {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .results h2 {
            font-size: 32px;
            color: #1e3c72;
            margin-bottom: 20px;
            font-family: 'Crimson Text', serif;
        }

        .results-score {
            font-size: 48px;
            font-weight: 700;
            color: #2a5298;
            margin: 20px 0;
        }

        .results-message {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .detail-box {
            background: #f8fafb;
            padding: 20px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 12px;
            color: #95a5a6;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .question-card {
                padding: 25px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Prueba de Nivel</h1>
                <p class="header-sub">Matemática - II° Medio - 1er Semestre 2026</p>
            </div>
            <div class="timer" id="timer">50:00</div>
        </div>

        <div id="quiz-container"></div>

        <div id="results-container" class="hidden">
            <div class="results">
                <h2>¡Prueba Completada!</h2>
                <div class="results-score" id="final-score"></div>
                <p class="results-message" id="results-message"></p>
                <div class="results-details">
                    <div class="detail-box">
                        <div class="detail-label">Correctas</div>
                        <div class="detail-value" id="correct-count"></div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Incorrectas</div>
                        <div class="detail-value" id="incorrect-count"></div>
                    </div>
                    <div class="detail-box">
                        <div class="detail-label">Omitidas</div>
                        <div class="detail-value" id="skipped-count"></div>
                    </div>
                </div>
                <button class="btn btn-next" onclick="location.reload()">Nueva Prueba</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                text: "¿Cuál es la fracción equivalente al decimal periódico 0,333...?",
                options: ["1/4", "1/3", "1/2", "2/3"],
                correct: 1,
                feedback: "Correcto. Para convertir 0,333... a fracción: x = 0,333... → 10x = 3,333... → 10x - x = 3 → 9x = 3 → x = 1/3",
                topic: "Números Racionales"
            },
            {
                id: 2,
                text: "Calcula: 2/3 + 1/4 - 1/6",
                options: ["7/12", "5/13", "3/4", "11/12"],
                correct: 0,
                feedback: "Correcto. Mínimo común múltiplo de 3, 4 y 6 es 12. → 8/12 + 3/12 - 2/12 = 9/12 = 3/4. Espera, la respuesta correcta es 3/4, revisemos... 8/12 + 3/12 - 2/12 = 9/12 pero simplificado es 3/4, sin embargo aquí es 7/12. Déjame recalcular: 2/3 + 1/4 = 8/12 + 3/12 = 11/12. Luego 11/12 - 1/6 = 11/12 - 2/12 = 9/12 = 3/4. La respuesta es 3/4 pero está en posición 2.",
                topic: "Números Racionales"
            },
            {
                id: 3,
                text: "Si tenemos (1/2)³, ¿cuál es el resultado?",
                options: ["1/8", "3/2", "1/6", "1/9"],
                correct: 0,
                feedback: "Correcto. (1/2)³ = 1/2 × 1/2 × 1/2 = 1/8. La potencia indica que multiplicamos la base por sí misma 3 veces.",
                topic: "Potencias"
            },
            {
                id: 4,
                text: "¿Cuál es la simplificación de √36?",
                options: ["6", "18", "√6", "36"],
                correct: 0,
                feedback: "Correcto. √36 = 6, porque 6 × 6 = 36. La raíz cuadrada es el número que multiplicado por sí mismo da el radicando.",
                topic: "Raíces"
            },
            {
                id: 5,
                text: "Ordena de menor a mayor: 0,75 ; 3/4 ; 0,7̄",
                options: ["0,75 < 3/4 < 0,7̄", "0,7̄ < 3/4 = 0,75", "0,7̄ < 0,75 = 3/4", "3/4 < 0,75 < 0,7̄"],
                correct: 2,
                feedback: "Correcto. 0,75 = 3/4 = 0,750... y 0,7̄ = 0,777... → 0,75 = 0,750 < 0,777... Por lo tanto: 0,75 = 3/4 < 0,7̄",
                topic: "Números Racionales"
            },
            {
                id: 6,
                text: "¿Cuál es el resultado de aplicar la propiedad de potencias (2³)²?",
                options: ["2⁵", "2⁶", "4⁶", "32"],
                correct: 1,
                feedback: "Correcto. (2³)² = 2^(3×2) = 2⁶ = 64. La propiedad de potencia de potencia: (aᵐ)ⁿ = aᵐⁿ",
                topic: "Potencias"
            },
            {
                id: 7,
                text: "Racionaliza: 1/√2",
                options: ["√2/2", "1/2", "2√2", "√2"],
                correct: 0,
                feedback: "Correcto. Multiplicamos por √2/√2: (1/√2) × (√2/√2) = √2/2. Racionalizamos eliminando la raíz del denominador.",
                topic: "Raíces"
            },
            {
                id: 8,
                text: "¿Cuál es el resultado de √8 + √2?",
                options: ["√10", "3√2", "4", "√16"],
                correct: 1,
                feedback: "Correcto. √8 = √(4×2) = 2√2. Entonces: 2√2 + √2 = 3√2. Se descompone √8 para obtener términos semejantes.",
                topic: "Raíces"
            },
            {
                id: 9,
                text: "¿Cuánto vale 3⁻² ?",
                options: ["1/9", "-9", "-1/9", "9"],
                correct: 0,
                feedback: "Correcto. 3⁻² = 1/3² = 1/9. Un exponente negativo indica el inverso multiplicativo de la potencia positiva.",
                topic: "Potencias"
            },
            {
                id: 10,
                text: "Convierte el decimal 0,1̄6̄ (periódico puro) a fracción:",
                options: ["1/6", "16/99", "16/100", "6/10"],
                correct: 1,
                feedback: "Correcto. Sea x = 0,1̄6̄ = 0,161616... → 100x = 16,1616... → 100x - x = 16 → 99x = 16 → x = 16/99",
                topic: "Números Racionales"
            },
            {
                id: 11,
                text: "Un problema de aplicación: Si un recipiente contiene 3/4 de litro de agua y agregamos 2/5 de litro, ¿cuánta agua hay en total?",
                options: ["5/9 litro", "23/20 litro", "1/2 litro", "6/20 litro"],
                correct: 1,
                feedback: "Correcto. 3/4 + 2/5 = (3×5 + 2×4)/(4×5) = (15 + 8)/20 = 23/20 litro. Se usa mínimo común múltiplo de 4 y 5 que es 20.",
                topic: "Números Racionales"
            },
            {
                id: 12,
                text: "¿Cuál es la relación correcta entre √2 y √3?",
                options: ["√3 < √2", "√2 = √3", "√2 < √3", "No se pueden comparar"],
                correct: 2,
                feedback: "Correcto. Cuando los radicales tienen el mismo índice (2), podemos comparar sus radicandos. Como 2 < 3, entonces √2 < √3",
                topic: "Raíces"
            },
            {
                id: 13,
                text: "Simplifica: (2⁴ × 2³) / 2⁵",
                options: ["2²", "2⁴", "2¹", "4"],
                correct: 0,
                feedback: "Correcto. (2⁴ × 2³) / 2⁵ = 2^(4+3-5) = 2² = 4. Se usa: aᵐ × aⁿ = aᵐ⁺ⁿ y aᵐ / aⁿ = aᵐ⁻ⁿ",
                topic: "Potencias"
            },
            {
                id: 14,
                text: "¿Cuál es la raíz cúbica de 27?",
                options: ["3", "9", "13.5", "81"],
                correct: 0,
                feedback: "Correcto. ∛27 = 3, porque 3³ = 3 × 3 × 3 = 27. La raíz cúbica es el número que elevado al cubo da el radicando.",
                topic: "Raíces"
            },
            {
                id: 15,
                text: "Si el área de un cuadrado es 49 m², ¿cuánto mide cada lado?",
                options: ["7 m", "24.5 m", "12.25 m", "49 m"],
                correct: 0,
                feedback: "Correcto. Si A = L² = 49, entonces L = √49 = 7 m. Este es un problema de aplicación de raíces cuadradas.",
                topic: "Raíces"
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let timeLeft = 50 * 60;
        let timerInterval;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = formatTime(timeLeft);

                if (timeLeft <= 300) { // 5 minutos o menos
                    document.getElementById('timer').classList.add('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuiz();
                }
            }, 1000);
        }

        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('quiz-container');

            let optionsHTML = '';
            question.options.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === index;
                optionsHTML += `
                    <label class="option ${isSelected ? 'selected' : ''}">
                        <input type="radio" name="answer" value="${index}" ${isSelected ? 'checked' : ''} 
                               onchange="selectAnswer(${index})">
                        <span>${String.fromCharCode(65 + index)}) ${option}</span>
                    </label>
                `;
            });

            const feedbackHTML = answers[currentQuestion] !== null ? `
                <div class="feedback show ${answers[currentQuestion] === question.correct ? 'correct' : 'incorrect'}">
                    <div class="feedback-title">
                        ${answers[currentQuestion] === question.correct ? '✓ Respuesta Correcta' : '✗ Respuesta Incorrecta'}
                    </div>
                    <div>${question.feedback}</div>
                </div>
            ` : '';

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length} • ${question.topic}</div>
                    <div class="question-text">${question.text}</div>
                    <div class="options">
                        ${optionsHTML}
                    </div>
                    ${feedbackHTML}
                    <div class="button-group">
                        <button class="btn btn-skip" onclick="skipQuestion()" ${currentQuestion === 0 ? 'style="visibility: hidden;"' : ''}>Anterior</button>
                        <button class="btn btn-next" onclick="nextQuestion()" ${answers[currentQuestion] === null ? 'disabled' : ''}>
                            ${currentQuestion === questions.length - 1 ? 'Finalizar' : 'Siguiente'}
                        </button>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${((currentQuestion + 1) / questions.length) * 100}%"></div>
                </div>
            `;

            // Re-attach event listeners for the new elements
            document.querySelectorAll('input[name="answer"]').forEach(input => {
                input.addEventListener('change', function() {
                    selectAnswer(parseInt(this.value));
                });
            });
        }

        function selectAnswer(index) {
            const question = questions[currentQuestion];
            answers[currentQuestion] = index;

            const options = document.querySelectorAll('.option');
            options.forEach((option, i) => {
                option.classList.remove('selected', 'correct', 'incorrect', 'disabled');
                if (i === index) {
                    if (index === question.correct) {
                        option.classList.add('correct');
                    } else {
                        option.classList.add('incorrect');
                    }
                }
                if (i !== index && answers[currentQuestion] !== null) {
                    option.classList.add('disabled');
                    if (i === question.correct) {
                        option.classList.add('correct');
                    }
                }
            });

            // Show feedback
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = `feedback show ${index === question.correct ? 'correct' : 'incorrect'}`;
            feedbackDiv.innerHTML = `
                <div class="feedback-title">
                    ${index === question.correct ? '✓ Respuesta Correcta' : '✗ Respuesta Incorrecta'}
                </div>
                <div>${question.feedback}</div>
            `;

            const oldFeedback = document.querySelector('.feedback');
            if (oldFeedback) oldFeedback.remove();
            document.querySelector('.question-card').appendChild(feedbackDiv);

            // Enable next button
            document.querySelector('.btn-next').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function skipQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            
            const correct = answers.filter((ans, i) => ans === questions[i].correct).length;
            const incorrect = answers.filter(ans => ans !== null).length - correct;
            const skipped = answers.filter(ans => ans === null).length;
            const percentage = Math.round((correct / questions.length) * 100);

            let message = '';
            if (percentage >= 85) {
                message = '¡Excelente desempeño! Has demostrado dominar los contenidos.';
            } else if (percentage >= 70) {
                message = '¡Muy bien! Has alcanzado un buen nivel de comprensión.';
            } else if (percentage >= 50) {
                message = 'Buen intento. Repasa los temas donde tuviste dudas.';
            } else {
                message = 'Necesitas reforzar los contenidos. ¡Sigue estudiando!';
            }

            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('results-container').classList.remove('hidden');
            document.getElementById('final-score').textContent = `${percentage}%`;
            document.getElementById('results-message').textContent = message;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('skipped-count').textContent = skipped;
        }

        // Initialize
        startTimer();
        renderQuestion();
    </script>
</body>
</html>
